name: padho_guru
description: "पढ़ो Guru - NCERT Class 6-12 AI Study App. Click photo, get Hindi answer instantly!"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0

  # Camera & Image
  camera: ^0.12.0
  image_picker: ^1.0.0
  image_cropper: ^6.0.0

  # Payments
  in_app_purchase: ^3.2.0

  # Storage & Offline
  sqflite: ^2.3.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0
  google_fonts: ^6.0.0
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State Management
  provider: ^6.1.0

  # Utilities
  http: ^1.2.0
  fl_chart: ^0.68.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
