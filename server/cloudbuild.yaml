# पढ़ो गुरु — Cloud Build config for Cloud Run deployment
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/padho-guru-server'
      - '-f'
      - 'server/Dockerfile'
      - 'server/'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/padho-guru-server'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'padho-guru-server'
      - '--image=gcr.io/$PROJECT_ID/padho-guru-server'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--set-env-vars=OPENAI_API_KEY=$$OPENAI_API_KEY'
      - '--set-secrets=OPENAI_API_KEY=openai-api-key:latest'
    secretEnv: ['OPENAI_API_KEY']
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/openai-api-key/versions/latest
      env: OPENAI_API_KEY
timeout: '600s'
